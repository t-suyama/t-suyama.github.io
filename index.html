<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Simple Demo</title>
	<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
	<script src="https://unpkg.com/vue-qrcode-reader@5/dist/vue-qrcode-reader.umd.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/vuetify@4.0.7/dist/vuetify.min.js"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vuetify@4.0.7/dist/vuetify.min.css">
</head>
<body>
	<div id="app">
		<v-app>
			<v-app-bar title="ホゲホゲ4">
				<v-btn @click="paused = !paused " icon="mdi-plus" color="primary"></v-btn>
			</v-app-bar>
		    <v-footer
		      color="grey"
		      height="44"
		      app
		    ></v-footer>
			<v-main>
				<v-container>
					<template v-if="!paused">
					<p style="color: red">{{ error }}</p>
					<p>Last result: <b>{{ result }}</b>{{cameras}}</p>
					<div style="border: 2px solid black">
						<qrcode-stream
							:paused="paused"
							:track="paintBoundingBox"
							@detect="onDetect" 
							@error="onError"></qrcode-stream>
					</div>
					</template>
				</v-container>
			</v-main>
		</v-app>
	</div>
</body>
<script>
const { createApp, ref } = Vue
const { createVuetify } = Vuetify
const vuetify = createVuetify()
const result = ref('')
const error = ref('')
const paused = ref(false);
function paintBoundingBox(detectedCodes, ctx) {
	for (const detectedCode of detectedCodes) {
		const {
			boundingBox: { x, y, width, height }
		} = detectedCode	
		ctx.lineWidth = 2
		ctx.strokeStyle = '#007bff'
		ctx.strokeRect(x, y, width, height)
	}
}

function onError(err) {
	error.value = `[${err.name}]: `
	if (err.name === 'NotAllowedError') {
	  error.value += 'you need to grant camera access permission'
	} else if (err.name === 'NotFoundError') {
	  error.value += 'no camera on this device'
	} else if (err.name === 'NotSupportedError') {
	  error.value += 'secure context required (HTTPS, localhost)'
	} else if (err.name === 'NotReadableError') {
	  error.value += 'is the camera already in use?'
	} else if (err.name === 'OverconstrainedError') {
	  error.value += 'installed cameras are not suitable'
	} else if (err.name === 'StreamApiNotSupportedError') {
	  error.value += 'Stream API is not supported in this browser'
	} else if (err.name === 'InsecureContextError') {
	  error.value += 'Camera access is only permitted in secure context. Use HTTPS or localhost rather than HTTP.'
	} else {
	  error.value += err.message
	}
}

function onDetect(detectedCodes) {
	result.value = JSON.stringify(
	  detectedCodes.map(code => code.rawValue)
	)
	paused.value = true
}

const app = createApp({
	setup() {
	  return { result, error, onDetect, onError, paintBoundingBox, paused }
	}
})
app.use(vuetify)
app.use(VueQrcodeReader)
app.mount('#app')
</script>
</html>
